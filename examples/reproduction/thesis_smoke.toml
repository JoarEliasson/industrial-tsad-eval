[reproduction]
name = "thesis-smoke"
run_evidence = true
run_xai = true
run_profiles = false
run_assistant = true
xai_ks = [1, 3, 5]

[benchmark]
name = "thesis-smoke"
protocols = ["naive"]

[benchmark.evaluation]
threshold_quantile = 0.995

[[datasets]]
id = "opcua"
prepared = "../generated/OPCUA_SYNTH"

[[detectors]]
id = "forecast-ridge-smoke"
name = "forecast-ridge"
parameters = { window = 24, stride = 4, lags = 1, alpha = 1.0, standardize = true, seed = 1337 }

[assistant]
suite_id = "thesis-smoke-assistant"
prepared = "../generated/OPCUA_SYNTH"
cases_per_dataset = 2
top_k = 6
minimum_supported_claims = 1
prompt_budget_chars = 8000
query_template = "For dataset {dataset}, event {event_id}: summarize likely causes, first operator checks, and immediate actions using only cited retrieved evidence. Prioritize {top_variables}."

[assistant.provider]
name = "fake"
model = "fake-assistant"
